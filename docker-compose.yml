services:
  # ── API com SQLite (perfil padrão / local) ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Provider=Sqlite
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/goodhamburger.db
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET env var is required}
      - Jwt__Issuer=GoodHamburger
      - Jwt__Audience=GoodHamburger
    volumes:
      - app-data:/app/data
    profiles:
      - sqlite

  # ── API com PostgreSQL ────────────────────────────────────────────────────────
  api-postgres:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Provider=PostgreSQL
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=goodhamburger;Username=postgres;Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET env var is required}
      - Jwt__Issuer=GoodHamburger
      - Jwt__Audience=GoodHamburger
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - postgres

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: goodhamburger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d goodhamburger"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  # ── API com SQL Server ────────────────────────────────────────────────────────
  api-sqlserver:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Provider=SqlServer
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=goodhamburger;User Id=sa;Password=${SQLSERVER_PASSWORD:?SQLSERVER_PASSWORD env var is required};TrustServerCertificate=True
      - Jwt__Secret=${JWT_SECRET:?JWT_SECRET env var is required}
      - Jwt__Issuer=GoodHamburger
      - Jwt__Audience=GoodHamburger
    depends_on:
      sqlserver:
        condition: service_healthy
    profiles:
      - sqlserver

  # ── SQL Server ────────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      SA_PASSWORD: ${SQLSERVER_PASSWORD:?SQLSERVER_PASSWORD env var is required}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    profiles:
      - sqlserver

volumes:
  app-data:
  postgres-data:
  sqlserver-data:
