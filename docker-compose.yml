services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/goodhamburger.db
      - Jwt__Secret=GoodHamburger-SuperSecret-Key-Min32Chars!!
      - Jwt__Issuer=GoodHamburger
      - Jwt__Audience=GoodHamburger
    volumes:
      - app-data:/app/data

volumes:
  app-data:
